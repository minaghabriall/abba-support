name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly sanity check
    - cron: '0 9 * * 1'

jobs:
  link-check:
    name: Check links in site content
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,204,206,403,429 './**/*.html' './**/*.md'
          fail: true
